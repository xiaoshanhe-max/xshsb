<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小山无敌 · 传世无忧保费计算器</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, "苹方", "PingFang SC", "Microsoft YaHei", sans-serif; background: #f0f2f5; color: #333; }
.header { background: linear-gradient(135deg, #1a3a5c 0%, #2d6aa0 100%); color: white; padding: 20px 30px; text-align: center; }
.header h1 { font-size: 24px; margin-bottom: 4px; }
.header p { font-size: 13px; opacity: 0.8; }

.container { max-width: 1400px; margin: 0 auto; padding: 20px; }

/* 计划选项卡 */
.tabs { display: flex; gap: 2px; margin-bottom: 0; }
.tab { flex: 1; padding: 14px 10px; text-align: center; cursor: pointer; font-size: 15px; font-weight: 600; border: none; border-radius: 8px 8px 0 0; transition: all 0.2s; }
.tab.active { color: white; }
.tab:not(.active) { background: #e8ecf1; color: #666; }
.tab:not(.active):hover { background: #dde3ea; }
.tab-cn { background: #3a7bd5; } .tab-cn.active { background: #3a7bd5; }
.tab-dzh { background: #4caf50; } .tab-dzh.active { background: #4caf50; }
.tab-exus { background: #ff9800; } .tab-exus.active { background: #ff9800; }
.tab-global { background: #e53935; } .tab-global.active { background: #e53935; }

/* 卡片 */
.card { background: white; border-radius: 0 0 12px 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.card-top { border-radius: 12px 12px 0 0; }

/* 输入区 */
.input-row { display: flex; gap: 24px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
.input-group { display: flex; align-items: center; gap: 8px; }
.input-group label { font-weight: 600; font-size: 14px; white-space: nowrap; }
.input-group select, .input-group input { padding: 8px 12px; border: 2px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; transition: border-color 0.2s; }
.input-group select:focus, .input-group input:focus { border-color: #3a7bd5; }
.age-input { width: 80px; text-align: center; font-size: 20px; font-weight: 700; color: #c00; }

/* 选项区 */
.options { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
.option-chip { padding: 8px 16px; border: 2px solid #ddd; border-radius: 20px; cursor: pointer; font-size: 13px; transition: all 0.2s; user-select: none; }
.option-chip:hover { border-color: #999; }
.option-chip.selected { border-color: #3a7bd5; background: #e8f0fe; color: #3a7bd5; font-weight: 600; }

/* 保费显示 */
.premium-display { text-align: center; padding: 24px; background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%); border-radius: 10px; margin-bottom: 16px; }
.premium-display .label { font-size: 13px; color: #888; margin-bottom: 4px; }
.premium-display .amount { font-size: 36px; font-weight: 800; color: #c00; }
.premium-display .detail { font-size: 13px; color: #666; margin-top: 8px; }

/* 明细行 */
.detail-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
.detail-row .name { color: #666; }
.detail-row .value { font-weight: 600; }

/* 表格 */
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: #f5f6f8; padding: 10px 8px; text-align: center; font-weight: 600; border-bottom: 2px solid #ddd; position: sticky; top: 0; z-index: 1; }
td { padding: 8px; text-align: center; border-bottom: 1px solid #f0f0f0; }
tr:nth-child(even) td { background: #fafbfc; }
tr:hover td { background: #e8f0fe; }

.table-wrap { max-height: 500px; overflow-y: auto; border-radius: 8px; border: 1px solid #eee; }

/* 汇总对比 */
.comparison-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.comp-card { padding: 16px; border-radius: 10px; text-align: center; }
.comp-card h3 { font-size: 14px; margin-bottom: 8px; }
.comp-card .prem { font-size: 22px; font-weight: 800; }
.comp-card .range { font-size: 12px; color: #888; margin-top: 4px; }

.footer { text-align: center; padding: 20px; color: #999; font-size: 12px; }
</style>
</head>
<body>

<div class="header">
  <h1>传世无忧2026保险计划</h1>
  <p>小山无敌 · 传世无忧 — 四大计划 · 实时对比</p>
</div>

<div class="container">

<!-- 选项卡 -->
<div class="tabs">
  <button class="tab tab-cn active" onclick="switchPlan('大陆')">🇨🇳 大陆计划</button>
  <button class="tab tab-dzh" onclick="switchPlan('大中华')">🇭🇰 大中华计划</button>
  <button class="tab tab-exus" onclick="switchPlan('全球除美')">🌏 全球除美国</button>
  <button class="tab tab-global" onclick="switchPlan('全球')">🌍 全球计划</button>
</div>

<!-- 当前计划 -->
<div class="card" id="current-plan-card">
  <div class="input-row">
    <div class="input-group">
      <label>投保年龄</label>
      <input type="number" class="age-input" id="age" value="30" min="0" max="98" onchange="updateAll()" oninput="updateAll()">
      <span>岁</span>
    </div>
    <div class="input-group">
      <label>等待期</label>
      <select id="waiting" onchange="updateAll()">
        <option value="有">有等待期</option>
        <option value="无">无等待期</option>
      </select>
    </div>
    <div class="input-group">
      <label>医保身份</label>
      <select id="insurance" onchange="updateAll()">
        <option value="有医保">有医保</option>
        <option value="无医保">无医保</option>
      </select>
    </div>
    <div class="input-group">
      <label>累计年限</label>
      <input type="number" class="age-input" id="cumulative-years" value="10" min="1" max="100" onchange="updateAll()" oninput="updateAll()">
      <span>年</span>
    </div>
  </div>

  <div id="options-area" style="margin-bottom:16px;"></div>

  <div class="premium-display" id="premium-display">
    <div class="label">首年保费</div>
    <div class="amount" id="premium-amount">¥ —</div>
    <div class="detail" id="premium-detail"></div>
  </div>

  <div id="detail-breakdown"></div>
</div>

<!-- 四大计划对比 -->
<div class="card">
  <h3 style="margin-bottom:12px;">📊 四大计划保费对比 (同年龄)</h3>
  <div class="comparison-grid" id="comparison-grid"></div>
</div>

<!-- 逐年保费表 -->
<div class="card">

  <div class="table-wrap">
    <table>

      </thead>
      <tbody id="yearly-table"></tbody>
    </table>
  </div>
</div>

<div class="footer">小山无敌 · 费率数据来源于官方费率表 · 仅供参考</div>
</div>

// 计划配置
const PLANS = {
  '大陆': {
    color: '#3a7bd5', bg: '#daeef3',
    hospOptions: ['医保定点+质子重离子', '不含昂贵医院'],
    deductOptions: ['2万'],
    outpatientOptions: [],
    hasOutpatient: false,
    hasTumor: true,
  },
  '大中华': {
    color: '#4caf50', bg: '#e2efda',
    hospOptions: ['不含昂贵医院', '含昂贵医院'],
    deductOptions: ['1万', '2万'],
    outpatientOptions: [],
    hasOutpatient: false,
    hasTumor: true,
  },
  '全球除美': {
    color: '#ff9800', bg: '#fde9d9',
    hospOptions: ['不含昂贵医院', '含昂贵医院'],
    deductOptions: ['0', '1万'],
    outpatientOptions: ['不附加门诊', '仅一般门急诊', '门急诊+牙科'],
    hasOutpatient: true,
    hasTumor: true,
  },
  '全球': {
    color: '#e53935', bg: '#f2dcdb',
    hospOptions: ['含昂贵医院'],
    deductOptions: ['0', '1万'],
    outpatientOptions: ['不附加门诊', '仅一般门急诊', '门急诊+牙科'],
    hasOutpatient: true,
    hasTumor: true,
  },
};

let currentPlan = '大陆';
let selections = {};

function init() {
  for (let p in PLANS) {
    selections[p] = {
      hosp: PLANS[p].hospOptions[0],
      deduct: PLANS[p].deductOptions[0],
      outpatient: PLANS[p].hasOutpatient ? PLANS[p].outpatientOptions[0] : '无门诊',
      tumor: false,
    };
  }
  switchPlan('大陆');
}

function switchPlan(plan) {
  currentPlan = plan;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab-${plan === '大陆' ? 'cn' : plan === '大中华' ? 'dzh' : plan === '全球除美' ? 'exus' : 'global'}`).classList.add('active');
  renderOptions();
  updateAll();
}

function renderOptions() {
  const cfg = PLANS[currentPlan];
  const sel = selections[currentPlan];
  let html = '';

  // 医院范围
  html += '<div class="input-group" style="margin-bottom:8px;"><label>医院范围</label></div>';
  html += '<div class="options">';
  cfg.hospOptions.forEach(h => {
    html += `<span class="option-chip ${sel.hosp === h ? 'selected' : ''}" onclick="selectOption('hosp','${h}')">${h}</span>`;
  });
  html += '</div>';

  // 免赔额
  html += '<div class="input-group" style="margin-bottom:8px;"><label>年度免赔额</label></div>';
  html += '<div class="options">';
  cfg.deductOptions.forEach(d => {
    html += `<span class="option-chip ${sel.deduct === d ? 'selected' : ''}" onclick="selectOption('deduct','${d}')">${d}</span>`;
  });
  html += '</div>';

  // 门诊
  if (cfg.hasOutpatient) {
    html += '<div class="input-group" style="margin-bottom:8px;"><label>门诊选项</label></div>';
    html += '<div class="options">';
    cfg.outpatientOptions.forEach(o => {
      html += `<span class="option-chip ${sel.outpatient === o ? 'selected' : ''}" onclick="selectOption('outpatient','${o}')">${o}</span>`;
    });
    html += '</div>';
  }

  // 海外肿瘤
  if (cfg.hasTumor) {
    html += '<div class="input-group" style="margin-bottom:8px;"><label>海外肿瘤医疗</label></div>';
    html += '<div class="options">';
    html += `<span class="option-chip ${!sel.tumor ? 'selected' : ''}" onclick="selectOption('tumor',false)">不附加</span>`;
    html += `<span class="option-chip ${sel.tumor ? 'selected' : ''}" onclick="selectOption('tumor',true)">附加</span>`;
    html += '</div>';
  }

  document.getElementById('options-area').innerHTML = html;
}

function selectOption(key, value) {
  selections[currentPlan][key] = value;
  renderOptions();
  updateAll();
}

function getRate(plan, insurance, waiting, duty, hosp, deduct, age) {
  // 统一免赔额格式：'2万' -> '2万元'
  let dedKey = deduct;
  if (dedKey === '2万') dedKey = '2万元';
  else if (dedKey === '1万') dedKey = '1万元';
  const key = `${plan}|${insurance}|${waiting}|${duty}|${hosp}|${dedKey}|${Math.min(age, 98)}`;
  return RATES[key] || 0;
}

function calcPremium(plan, age, waiting, insurance) {
  const sel = selections[plan];
  const cfg = PLANS[plan];
  let total = 0;
  let details = [];

  if (plan === '大陆' || plan === '大中华') {
    let baseKey = plan === '大陆' ? (sel.hosp.includes('医保') ? '医保定点' : '不含昂贵') : (sel.hosp.includes('不含') ? '不含昂贵' : '含昂贵');
    let base = getRate(plan, insurance, waiting, '基本', baseKey, sel.deduct, age);
    details.push({name: '基本责任 (' + sel.hosp + ')', value: base});
    total += base;
    if (sel.tumor) {
      let t = getRate(plan, insurance, waiting, '海外肿瘤', '含昂贵', '0', age);
      details.push({name: '可选责任3 (海外肿瘤)', value: t});
      total += t;
    }
  } else {
    let hkey = sel.hosp.includes('不含') ? '不含昂贵' : '含昂贵';
    let bk = sel.outpatient === '不附加门诊' ? '基本' : sel.outpatient === '仅一般门急诊' ? '基本+门急诊' : '基本+门急诊+牙科';
    let base = getRate(plan, insurance, waiting, bk, hkey, sel.deduct, age);
    details.push({name: '基本责任' + (sel.outpatient !== '不附加门诊' ? ' + ' + sel.outpatient : '') + ' (' + sel.hosp + ')', value: base});
    total += base;
    if (sel.tumor) {
      let t = getRate(plan, insurance, waiting, '海外肿瘤', '含昂贵', '0', age);
      details.push({name: '可选责任3 (海外肿瘤)', value: t});
      total += t;
    }
  }

  return { total, details };
}

function updateAll() {
  const age = parseInt(document.getElementById('age').value) || 0;
  const waiting = document.getElementById('waiting').value;
  const insurance = document.getElementById('insurance').value;
  const cumYears = parseInt(document.getElementById('cumulative-years').value) || 10;

  // 更新当前计划保费
  const result = calcPremium(currentPlan, age, waiting, insurance);
  document.getElementById('premium-amount').textContent = '¥ ' + result.total.toLocaleString();
  document.getElementById('premium-detail').textContent = 
    `${PLANS[currentPlan].hospOptions.includes(selections[currentPlan].hosp) ? selections[currentPlan].hosp : selections[currentPlan].hosp} | 免赔${selections[currentPlan].deduct} | ${selections[currentPlan].tumor ? '附加' : '不附加'}海外肿瘤`;

  // 明细
  let detailHtml = '';
  result.details.forEach(d => {
    detailHtml += `<div class="detail-row"><span class="name">${d.name}</span><span class="value">¥ ${d.value.toLocaleString()}</span></div>`;
  });
  detailHtml += `<div class="detail-row" style="font-weight:700;font-size:15px;"><span>合计</span><span style="color:#c00;">¥ ${result.total.toLocaleString()}</span></div>`;
  document.getElementById('detail-breakdown').innerHTML = detailHtml;

  // 逐年保费表 + 累计总保费
  let tableHtml = '';
  let cumulativeSum = 0;
  for (let year = 1; year <= 100; year++) {
    let a = age + year - 1;
    if (a > 98) a = 98;
    let prem = calcPremium(currentPlan, a, waiting, insurance).total;
    cumulativeSum += prem;
    let cumClass = year === cumYears ? 'style="font-weight:700;color:#c00;"' : '';
    tableHtml += `<tr><td>${year}</td><td>${a}岁</td><td>¥ ${prem.toLocaleString()}</td><td ${cumClass}>¥ ${cumulativeSum.toLocaleString()}</td></tr>`;
  }
  document.getElementById('yearly-table').innerHTML = tableHtml;

  // 四大计划对比（含累计总保费）
  let compHtml = '';
  const compColors = {'大陆':'#3a7bd5','大中华':'#4caf50','全球除美':'#ff9800','全球':'#e53935'};
  const compBgs = {'大陆':'#daeef3','大中华':'#e2efda','全球除美':'#fde9d9','全球':'#f2dcdb'};
  const emoji = {'大陆':'🇨🇳','大中华':'🇭🇰','全球除美':'🌏','全球':'🌍'};

  for (let plan of ['大陆','大中华','全球除美','全球']) {
    // 计算该计划在当前选择下的保费（用该计划的当前选择）
    let selBackup = {...selections[plan]};
    let r = calcPremium(plan, age, waiting, insurance);

    // 同时计算该计划所有组合的范围
    let allPremiums = [];
    let cfg = PLANS[plan];
    for (let h of cfg.hospOptions) {
      for (let d of cfg.deductOptions) {
        let outOpts = cfg.hasOutpatient ? cfg.outpatientOptions : ['无门诊'];
        for (let o of outOpts) {
          for (let t of [false, true]) {
            selections[plan] = {hosp: h, deduct: d, outpatient: o, tumor: t};
            allPremiums.push(calcPremium(plan, age, waiting, insurance).total);
          }
        }
      }
    }
    selections[plan] = selBackup;

    let pmin = Math.min(...allPremiums);
    let pmax = Math.max(...allPremiums);

    // 计算该计划累计N年总保费
    let cumTotal = 0;
    for (let y = 1; y <= cumYears; y++) {
      let a = age + y - 1;
      if (a > 98) a = 98;
      cumTotal += calcPremium(plan, a, waiting, insurance).total;
    }

    compHtml += `
      <div class="comp-card" style="background:${compBgs[plan]};border:2px solid ${compColors[plan]};">
        <h3>${emoji[plan]} ${plan}计划</h3>
        <div class="prem" style="color:${compColors[plan]};">¥ ${r.total.toLocaleString()}</div>
        <div class="range">${allPremiums.length}种组合 · ¥${pmin.toLocaleString()} ~ ¥${pmax.toLocaleString()}</div>
        <div class="cumulative" style="margin-top:8px;padding-top:8px;border-top:1px dashed #ccc;">
          <span style="font-size:12px;color:#888;">${cumYears}年累计</span>
          <span style="font-size:16px;font-weight:700;display:block;color:${compColors[plan]};">¥ ${cumTotal.toLocaleString()}</span>
        </div>
      </div>`;
  }
  document.getElementById('comparison-grid').innerHTML = compHtml;
}

init();
</script>
</body>
